    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x = 10; // let is used to declare a variable in java script and x is the name of the variable and 10 is the value assigned to the variable
        //let x = 20; // let keyword does not allow us to redeclare the variable with the same name until we comment the previous line
        document.write(x); // no output will be shown because we cannot redeclare the variable with let keyword until we comment the previous line
    </script>
