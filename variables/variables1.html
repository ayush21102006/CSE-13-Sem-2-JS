    <script>
        var x = 10 ; // var is used to declare a variable in java script and x is the name of the variable and 10 is the value assigned to the variable 
        var x = 20; // we can reassign the value of the variable but we cannot redeclare the variable with var keyword
        document.write(x); // here the value of x will be 20 because we have reassigned the value of x to 20
        var name = "Ayush"; 
        var name = "Rohit"; 
        document.write(name); // here the value of name will be Ayush because we have assigned the value of name to Ayush
    </script>
