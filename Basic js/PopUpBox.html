<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //pop up boxes(alert, confirm, prompt)
        alert ("welcome to my web page");  // alert is used to show a message in the form of pop up box
        confirm("press ok for blank page");  // confirm is used to show a message in the form of pop up box with two buttons ok and cancel
        prompt("please enter your phone numbers");  // prompt is used to show a message in the form of pop up box with a text box and two buttons ok and cancel
        </script>
</body>
</html>
