<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non Primitive Data Type</title>
</head>
<body>
    <script>
        // non primitive data type
        let person = {name: "Ayush", age: 20}; // object data type is used to store a collection of data in the form of key value pairs and it is denoted by curly braces {}
        let numbers = [1, 2, 3, 4, 5]; // array data type is used to store a collection of data in the form of an ordered list and it is denoted by square brackets []
        function greet() { // function data type is used to store a block of code that can be executed when called and it is denoted by the keyword function
            return "Hello, welcome to my web page";
        }
        document.write(person.name); // here we are accessing the name property of the person object
        document.write(numbers[0]); // here we are accessing the first element of the numbers array
        document.write(greet()); // here we are calling the greet function and it will return the string "Hello, welcome to my web page"
    </script>
</body>
</html>
