<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primitive Data Type</title>
</head>
<body>
    <script>
        //primitive data type
        let name = "Ayush"; // string data type is used to store text and it is enclosed in double quotes or single quotes
        let age = 20; // number data type is used to store numeric values
        let isStudent = true; // boolean data type is used to store true or false values
        let address; // undefined data type is used to store a variable that has not been assigned a value
        let phoneNumber = null; // null data type is used to store a variable that has been assigned a null value
        let bigInt = 1234567890123456789012345678901234567890n; // bigInt data type is used to store large integers and it is denoted by the suffix n
        let symbol = Symbol("id"); // symbol data type is used to store a unique identifier and it is denoted by the function Symbol()
        document.write(name); 
        document.write(age);
        document.write(isStudent);
        document.write(address);
        document.write(phoneNumber);
        document.write(bigInt);
        document.write(symbol);
    </script>
    
</body>
</html>
